name: Run the tests

on:
  pull_request:
    branches: ['main']

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # node 18 is EOL and the dev toolchain (ava's cbor dep) needs >= 20;
        # 22 matches the release job.
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - name: Install NPM Dependencies
        run: yarn install
      - run: yarn test
